repos:
  - repo: https://github.com/ambv/black
    rev: 26.5.1
    hooks:
    - id: black
      language_version: python3
      args:
        - "--preview"
  - repo: https://github.com/pycqa/isort
    rev: 8.0.1
    hooks:
      - id: isort
        name: isort (python)
        args: ["--profile", "black"]
  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        args: 
          - "--max-line-length=88"
          - "--ignore=E203,W503"
        exclude: ^(docs/|\.venv/)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: 'v2.1.0'
    hooks:
      - id: mypy
